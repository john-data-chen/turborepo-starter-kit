packages:
  - apps/*
  - packages/*

allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@scarf/scarf": true
  "@swc/core": true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true

catalog:
  "@radix-ui/react-icons": ^1.3.2
  "@tailwindcss/postcss": ^4.3.0
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@types/node": "^24.13.2"
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@typescript/native-preview": "7.0.0-dev.20260611.2"
  "@vitest/coverage-v8": ^4.1.8
  class-variance-authority: ^0.7.1
  dotenv: ^17.4.2
  jsdom: ^29.1.1
  lucide-react: ^1.17.0
  react: ^19.2.7
  react-dom: ^19.2.7
  react-hook-form: ^7.77.0
  tailwindcss: ^4.3.0
  vitest: ^4.1.8
  zod: ^4.4.3
  zustand: ^5.0.14

minimumReleaseAge: 0

nodeLinker: hoisted

overrides:
  lightningcss: 1.30.1
  "@types/node": "^24.12.4"
  # Collapse react/react-dom to a single copy across the workspace. Web pins
  # 19.2.7 while mobile/expo pulls 19.2.3; without this, pnpm hoists the mobile
  # variant and gives shared UI libs (e.g. @radix-ui/*) a nested react@19.2.3,
  # breaking React's hook dispatcher in vitest ("reading 'useId'" on null).
  # react-native's peer is ^19.2.3, which 19.2.7 satisfies.
  react: ^19.2.7
  react-dom: ^19.2.7
