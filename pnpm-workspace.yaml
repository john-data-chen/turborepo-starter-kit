  - expo-file-system@55.0.21
  - expo-font@55.0.8
  - expo-modules-autolinking@55.0.23
  - expo-server@55.0.10
  - expo@55.0.25
  - expo-localization@55.0.15
  - expo-router@55.0.15
  - expo-symbols@55.0.9

nodeLinker: hoisted

