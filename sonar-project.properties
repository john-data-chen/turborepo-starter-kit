sonar.projectKey=john-data-chen_turborepo-starter-kit
sonar.organization=john-data-chen

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=turborepo-starter-kit
#sonar.projectVersion=1.0

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources = .

# Include source files from all apps and packages
sonar.inclusions = \
  apps/web/src/**/*.{ts,tsx}, \
  apps/api/src/**/*.{ts,tsx}, \
  apps/mobile/app/**/*.{ts,tsx}, \
  apps/mobile/components/**/*.{ts,tsx}, \
  apps/mobile/hooks/**/*.{ts,tsx}, \
  apps/mobile/lib/**/*.{ts,tsx}, \
  apps/mobile/stores/**/*.{ts,tsx}, \
  packages/i18n/src/**/*.{ts,tsx}, \
  packages/store/src/**/*.{ts,tsx}, \
  packages/ui/src/**/*.{ts,tsx}

# Exclude test files, configs, and generated code from analysis
sonar.exclusions = \
  **/*.test.{ts,tsx}, \
  **/*.spec.{ts,tsx}, \
  **/__tests__/**, \
  **/node_modules/**, \
  **/dist/**, \
  **/coverage/**

# Exclude non-testable files from coverage reporting
sonar.coverage.exclusions = \
  **/*.test.{ts,tsx}, \
  **/*.spec.{ts,tsx}, \
  **/__tests__/**, \
  **/types/**/*.{ts,tsx}, \
  **/constants/**/*.{ts,tsx}, \
  apps/mobile/app/_layout.tsx, \
  packages/i18n/src/locales/**